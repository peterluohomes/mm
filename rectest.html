<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Recording Shortcuts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a2b4a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 20px;
  }
  h1 {
    color: #c9a84c;
    font-size: 20px;
    text-align: center;
    letter-spacing: 1px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 280px;
    padding: 20px 24px;
    border-radius: 16px;
    border: none;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:active {
    transform: scale(0.96);
  }
  .btn-vmemo {
    background: #ff3b30;
    color: white;
    box-shadow: 0 4px 20px rgba(255,59,48,0.4);
  }
  .btn-dropbox {
    background: #0061ff;
    color: white;
    box-shadow: 0 4px 20px rgba(0,97,255,0.4);
  }
  .icon { font-size: 28px; }
</style>
</head>
<body>
  <h1>Recording Shortcuts</h1>
  <a class="btn btn-vmemo" href="shortcuts://run-shortcut?name=Vmemo">
    <span class="icon">🎙</span> Voice Memo
  </a>
  <a class="btn btn-dropbox" href="shortcuts://run-shortcut?name=drpbxrcrd">
    <span class="icon">📦</span> Dropbox Record
  </a>
</body>
</html>
