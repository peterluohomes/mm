<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrival & Walkthrough Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A1A2E;--blue:#2C5F7C;--blue-light:#3A7CA5;--green:#2E7D32;--green-bg:#E8F5E9;--orange:#D4760A;--orange-bg:#FFF3E0;--gray:#64748B;--light:#F8FAFC;--lighter:#EBF3F8;--white:#FFFFFF;--red:#C62828;--red-bg:#FFEBEE;--radius:12px;--shadow:0 2px 12px rgba(26,26,46,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--navy);min-height:100vh}
.nav{background:var(--navy);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.nav-title{color:var(--white);font-size:18px;font-weight:700;letter-spacing:-0.3px}
.nav-modes{display:flex;gap:6px;margin-left:auto}
.nav-btn{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--white)}
.nav-btn.active{background:var(--blue);color:var(--white);border-color:var(--blue-light)}
.container{max-width:860px;margin:0 auto;padding:32px 24px}
.section{margin-bottom:32px;animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-header{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--navy);color:var(--white);border-radius:var(--radius) var(--radius) 0 0;font-size:15px;font-weight:700;letter-spacing:0.5px;cursor:pointer;user-select:none;transition:background 0.2s}
.section-header:hover{background:#252542}
.section-header .emoji{font-size:20px}
.section-header .toggle{margin-left:auto;font-size:18px;transition:transform 0.3s}
.section-header.collapsed .toggle{transform:rotate(-90deg)}
.section-body{background:var(--white);border:1px solid #E2E8F0;border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:20px;overflow:hidden;transition:max-height 0.4s ease,padding 0.3s}
.section-body.hidden{max-height:0;padding:0 20px;border:none}
.delivery-cue{background:var(--green-bg);border-left:3px solid var(--green);padding:10px 16px;border-radius:0 8px 8px 0;margin-bottom:16px;font-size:13px;color:var(--green);font-style:italic}
.delivery-cue::before{content:"🎯 "}
.flow-map{background:var(--lighter);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.flow-map .label{font-weight:700;color:var(--blue);margin-right:4px}
.flow-step{background:var(--white);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;color:var(--navy);border:1px solid #E2E8F0}
.flow-arrow{color:var(--blue-light);font-size:14px}
.beat-label{font-size:13px;font-weight:600;color:var(--blue);font-style:italic;margin:16px 0 8px;padding-left:4px}
.anchor-line{padding:12px 16px;margin:8px 0;border-radius:8px;border-left:3px solid var(--orange);background:#FFFAF5;transition:all 0.2s;cursor:pointer;position:relative}
.anchor-line:hover{background:var(--orange-bg);transform:translateX(2px)}
.anchor-word{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--orange);background:rgba(212,118,10,0.1);padding:2px 8px;border-radius:4px;margin-right:8px}
.anchor-script{font-size:14.5px;line-height:1.65;color:var(--navy)}
.anchor-cue{display:block;margin-top:6px;font-size:12px;font-style:italic;color:var(--green)}
.action-box{background:#F0F4FF;border-left:3px solid #5B7FDB;padding:10px 16px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13px;color:#3B5998}
.action-box::before{content:"⚡ ACTION: ";font-weight:700}
.response-box{background:#FFF8E1;border-left:3px solid #F9A825;padding:10px 16px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13px;color:#7B6B2E}
.response-box::before{content:"↩ RESPONSE: ";font-weight:700}
.tip-box{background:#F3E5F5;border-left:3px solid #9C27B0;padding:10px 16px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13px;color:#6A1B9A}
.tip-box::before{content:"💡 TIP: ";font-weight:700}
.stage-dir{font-size:13px;font-style:italic;color:var(--gray);padding:4px 0 4px 20px}
/* Quiz */
.quiz-container{text-align:center;padding:40px 20px}
.quiz-progress{display:flex;gap:4px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.quiz-dot{width:28px;height:6px;border-radius:3px;background:#E2E8F0;transition:all 0.3s}
.quiz-dot.done{background:var(--green)}.quiz-dot.current{background:var(--orange);width:40px}.quiz-dot.wrong{background:var(--red)}
.score-bar{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:var(--shadow)}
.score-label{font-size:13px;color:var(--gray);font-weight:500}.score-value{font-size:24px;font-weight:700;color:var(--navy)}.score-detail{font-size:13px;color:var(--gray);margin-left:auto}
.quiz-section-label{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.quiz-prompt{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:8px}
.quiz-hint{font-size:14px;color:var(--gray);margin-bottom:32px}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px;margin:0 auto 24px}
.quiz-option{padding:16px;border:2px solid #E2E8F0;border-radius:var(--radius);background:var(--white);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--navy)}
.quiz-option:hover{border-color:var(--blue);background:var(--lighter)}
.quiz-option.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.quiz-reveal{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:24px;margin:24px auto;max-width:600px;text-align:left;box-shadow:var(--shadow)}
.quiz-reveal .script{font-size:15px;line-height:1.7;color:var(--navy)}
.quiz-next-btn{background:var(--blue);color:var(--white);border:none;padding:14px 32px;border-radius:8px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:16px}
.quiz-next-btn:hover{background:var(--blue-light);transform:translateY(-1px)}
/* Fill */
.fill-container{padding:20px 0}
.fill-card{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.fill-section-tag{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.fill-anchor{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--orange);background:rgba(212,118,10,0.1);padding:2px 8px;border-radius:4px;margin-bottom:12px;display:inline-block}
.fill-text{font-size:15px;line-height:1.75;color:var(--navy)}
.fill-blank{display:inline-block;min-width:100px;border-bottom:2px dashed var(--orange);color:transparent;padding:0 4px;margin:0 2px;cursor:pointer;transition:all 0.3s;border-radius:2px;user-select:none}
.fill-blank:hover{background:rgba(212,118,10,0.05)}
.fill-blank.revealed{color:var(--green);font-weight:600;border-bottom-color:var(--green);background:rgba(46,125,50,0.05)}
.fill-controls{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.fill-ctrl-btn{background:var(--white);color:var(--navy);border:1px solid #E2E8F0;padding:10px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.fill-ctrl-btn:hover{border-color:var(--blue);background:var(--lighter)}
.fill-ctrl-btn.active{background:var(--blue);color:var(--white);border-color:var(--blue)}
@media(max-width:640px){.nav{flex-wrap:wrap;padding:12px 16px}.nav-modes{width:100%;overflow-x:auto}.nav-btn{white-space:nowrap;font-size:12px;padding:6px 12px}.quiz-options{grid-template-columns:1fr}.quiz-prompt{font-size:22px}}

.fl-word{cursor:pointer;transition:all 0.2s;border-bottom:1px dotted var(--orange);padding:0 1px}
.fl-word:hover{background:rgba(212,118,10,0.05)}
.fl-word.fl-revealed{border-bottom-color:var(--green);color:var(--green);font-weight:600}

.fl-container{padding:20px 0}
.fl-card{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.fl-text{font-size:15px;line-height:2;color:var(--navy);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-title">🏠 Arrival & Walkthrough Trainer</div>
  <div class="nav-modes">
    <button class="nav-btn active" onclick="setMode('read')">📖 Read</button>
    <button class="nav-btn" onclick="setMode('quiz')">🧠 Quiz</button>
    <button class="nav-btn" onclick="setMode('fill')">✏️ Fill Blanks</button>
    <button class="nav-btn" onclick="setMode('firstletter')">🔤 First Letter</button>
  </div>
</nav>
<div class="container" id="app"></div>
<script>
const DATA=[
{id:"arrival",emoji:"👋",title:"ARRIVAL",cue:"Warm, genuine, unhurried. You're a guest in their home — show respect.",flow:["Greeting","Praise","Permission","Two Lenses","Protect Both"],lines:[
{type:"action",text:"Firm handshake, eye contact, genuine smile. Pause at the door."},
{anchor:"Greeting",script:"Thanks for having me. I know prep takes effort — I really appreciate the time."},
{type:"action",text:"Stop walking. Look at a specific feature (landscaping, door, entryway)."},
{anchor:"Praise",script:"Before we go in — I love this front porch. It has real charm. How do you typically use it?"},
{type:"response",text:"Wait for their answer. Support it: I can tell. You have done a great job with it."},
{anchor:"Permission",script:"Do you mind if I set my bag down right here?"},
{type:"action",text:"Stand still. Do not start the tour yet."},
{anchor:"Two Lenses",script:"Before we walk through, I want to explain the two angles I'll be looking at your home from. First, I'll see it the way YOU do — as a place full of memories and meaning. Then I'll look at it the way the MARKET does — as a product buyers are comparing against others.",cue:"← pause between the two angles"},
{anchor:"Protect Both",script:"My job is to protect both — the home you've loved and the equity you've built."},
]},
{id:"tour",emoji:"🚶",title:"TOUR",cue:"Energetic, curious. Hand them the lead — they're the guide now.",flow:["Tour Transition","The Entrance","Living Area","Kitchen","Bedrooms","Bathrooms","Basement","Garage","Exterior","Mechanicals"],lines:[
{anchor:"Tour Transition",script:"Great — please lead the way! Show me what you fell in love with. That's exactly what buyers need to hear. I will take notes so I do not miss any special details."},
{beat:"The Entrance",anchor:"The Entrance",script:"Wow, look at this natural light. What time of day is the light best in here? When you bought this house, what was the one thing that made you say Yes? The windows and doors feel solid. What upgrades have you done here? Quick question — when friends visit, what do they usually notice first?"},
{type:"response",text:"After they answer: Perfect. That is exactly what every buyer will feel walking in."},
{beat:"Living Area",anchor:"Living Area",script:"This room pulls you in. Tell me your favorite memory here — holiday mornings, game nights? The light here is beautiful. What time of day do you love it most? That is exactly when we will bring in the photographer. How attached are you to the current furniture layout? One thing I often ask sellers — how do you feel about packing away roughly half the items on shelves, counters, and walls before we shoot photos?"},
{type:"response",text:"After they share: That feeling is what sells the home. Buyers remember stories, not square footage."},
{beat:"Kitchen",anchor:"Kitchen",script:"What do guests comment about your kitchen? Great storage. What storage solutions do you have inside the cabinets? Buyers love those details. Appliances look well-maintained. What do you know about the appliances — age, warranties? Buyers always ask. If you could change one thing about this kitchen, what would it be?"},
{type:"tip",text:"Clear counters make the kitchen look twice as big on camera. Note which small appliances are out."},
{beat:"Main Bedroom",anchor:"Bedrooms",script:"This feels peaceful. How does this space help you recharge? This closet has great depth. What would help it photograph even bigger? This room is flexible. How has it served you best? Office, guest room, gym? Do these windows open easily? Quick question while we're upstairs — when buyers come through for showings, homes always present best when the family steps out for the appointment. Are you and the kids (and any pets) able to do that on short notice?"},
{beat:"Bathrooms",anchor:"Bathrooms",script:"The tile and fixtures look fresh. Updated bathrooms add a lot of value. For the photos, we will want that clean spa look — it gets way more clicks. I will send you a quick checklist; most sellers knock it out in an hour."},
{type:"tip",text:"Note any small deferred items silently: caulk lines, slow drains, loose towel bars, burnt-out bulbs."},
{beat:"Basement",anchor:"Basement",script:"This space feels dry and solid. What systems do you have in place to keep this space dry? What was your dream for this space before life took you in a new direction? Potential is just as valuable as finished space. The electrical panel looks modern. What electrical upgrades have you done — EV charger, panel, outlets?"},
{beat:"Garage",anchor:"Garage",script:"How do you use your garage — storage, workshop, parking? Buyers always want to know."},
{beat:"Exterior",anchor:"Exterior",script:"The front yard is welcoming. What comes up throughout the seasons? The backyard feels like part of the house. How do you use this backyard on a summer evening? The roof looks good. What do you know about the roof — age, repairs? Newer roofs save sellers thousands in negotiations. What's your favorite thing about the neighborhood that someone driving by wouldn't know?"},
{beat:"Mechanicals",anchor:"Mechanicals",script:"Roughly how old are the furnace, A/C, and water heater? Do you happen to have service records or receipts? Having them in a tidy folder during showings builds buyer confidence fast."},
{type:"response",text:"After they answer: This proves you have taken great care of the home. Buyers pay more for peace of mind."},
]},
{id:"prepplan",emoji:"📋",title:"PREPARATION PLAN",cue:"Stop near the back door or hallway — still standing, still inside the home. 2–3 minutes max. Frame as planning, not grading.",flow:["Quick planning","Interior Designer","Paint","Prelisting-inspection","Off-limits","Time & Budget","response","Short Plan"],lines:[
{anchor:"Quick planning",script:"Before we head back and sit down, let me ask you a few quick planning questions. There are no right or wrong answers — I just need to understand where you sit so the plan I build for you actually fits your life. Some sellers want to do a lot before listing, some want to do as little as possible, and both can absolutely work."},
{anchor:"Interior Designer",script:"I work with an interior designer who can come in and provide a 'Priority One' list — just the highest-impact changes, no full redesign required. It can be as simple as rearranging furniture to open up a sightline, swapping out light bulbs for a warmer tone, or helping you pick the right neutral paint color if we decide to freshen up a room. Sometimes it's just one or two small moves that completely change how a space photographs and shows. Would you be open to that consultation? It's complimentary as part of my service.",cue:"← Script 1: Interior Designer Consult"},
{anchor:"Paint",script:"Are you open to a fresh coat of neutral paint in one or two key rooms if I felt it would meaningfully move the price? I'll only flag walls where the color is bold enough to narrow the buyer pool — nothing cosmetic for the sake of it.",cue:"← Script 2"},
{anchor:"Prelisting-inspection",script:"Some sellers like to get ahead of any surprises by doing a pre-listing inspection. Is that something you'd consider, or would you rather handle issues if and when they come up?",cue:"← Script 3"},
{anchor:"Off-limits",script:"Is there anything in the home you'd prefer not to change, move, or touch? I want to know now so I can plan around it.",cue:"← Script 4"},
{anchor:"Time & Budget",script:"Last one — based on what you've shared, it sounds like you're open to some things and want to skip others. Does that match how you're thinking about time and budget overall — a light-touch prep, or would you actually go further if I felt it was worth it? Some sellers invest a little upfront to maximize the sale price; others prefer to list as-is and price accordingly.",cue:"← Script 5"},
{anchor:"response",script:"Listen. Take notes. Do not push back on any 'no' — just acknowledge and capture. Their appetite answers shape the prep plan you'll deliver after the Price Presentation.",cue:"← If time is tight, Questions 1, 4, and 5 are the non-negotiables"},
{anchor:"Short Plan",script:"This is really helpful — thank you. Based on everything you just shared, I have a clear picture of what you're open to. Once we've agreed on strategy and price at the table, I'll put together a short prep plan built around your answers — so you'll know exactly what moves the needle and what doesn't. Nothing wasted, nothing imposed."},
]},
{id:"digging",emoji:"🔍",title:"WRAP-UP: DIGGING DEEPER",cue:"Shift tone — warmer, slower. You're transitioning from tour to conversation.",flow:["Digging-feeling","Digging-Upgrade","Digging-Next Renovation","Digging-Miss Most"],lines:[
{anchor:"Digging-feeling",script:"And you know, the feeling I'm getting as we walk through is really special — and that emotion is going to help sell this home. And to get the optimal price, we need to back it up with facts — the things buyers can't see."},
{anchor:"Digging-Upgrade",script:"So let me ask you this: over the years, have you made any major upgrades to the windows, insulation, or the plumbing and electrical systems? These are significant value-adders during appraisal.",cue:"← Listen and acknowledge: \"That's significant,\" \"That's going to help a lot\""},
{anchor:"Digging-Next Renovation",script:"That's really helpful — those hard metrics help the bank match our price. Now let me ask this: if you were going to stay another few years, what would have been your next renovation project?"},
{anchor:"Digging-Miss Most",script:"And finally, a more personal question on behalf of whoever ends up calling this place home: when you move, what's the one thing you're going to miss the most?",cue:"← This is usually a powerful, emotional moment. Listen deeply."},
]},
{id:"summary",emoji:"🎬",title:"SUMMARY & MOTIVATION",cue:"Grateful, impressed. Then shift to strategic — the scale question is your transition tool.",flow:["Impressed","Motivation","score 8-10","Score 1-7","transition"],lines:[
{anchor:"Impressed",script:"Thank you so much for the tour and for sharing these meaningful stories. Honestly, I'm very impressed with how beautifully you've loved and cared for this home."},
{anchor:"Motivation",script:"Before we get into the market data and pricing strategy, I'd like a quick sense of where you stand. On a scale of 1 to 10 — where 10 means \"we're confident and ready to take photos and list right now,\" and 1 means \"we're still hesitating and haven't fully decided to sell\" — where would you put yourselves today?",cue:"← Pause and listen"},
{anchor:"score 8-10",script:"Perfect! That tells me you're ready to move decisively. Thank you for that clarity — it really helps me serve you best.",cue:"← IF 8-10"},
{anchor:"Score 1-7",script:"I completely understand. Selling is a big milestone. What's the main thing holding you back from feeling fully ready right now?",cue:"← IF 1-7"},
{anchor:"transition",script:"Thank you again for opening up and for showing me your wonderful home. Now I'd like to sit down with you and talk about the best path forward to achieve the strongest possible outcome. Shall we move to the dining table?"},
]}
];

const ALL_ANCHORS=[];
DATA.forEach(s=>s.lines.forEach(l=>{if(l.anchor)ALL_ANCHORS.push({...l,sectionTitle:s.title,sectionEmoji:s.emoji})}));

let currentMode='read',quizState={index:0,score:0,answered:[],showingReveal:false},fillDifficulty=3;

function setMode(m){currentMode=m;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.nav-btn[onclick="setMode('${m}')"]`).classList.add('active');if(m==='quiz')quizState={index:0,score:0,answered:new Array(ALL_ANCHORS.length).fill(null),showingReveal:false};render()}

function render(){const app=document.getElementById('app');switch(currentMode){case'read':app.innerHTML=renderRead();break;case'quiz':app.innerHTML=renderQuiz();break;case'fill':app.innerHTML=renderFill();break;case'firstletter':app.innerHTML=renderFirstLetter();break;}}

function renderRead(){return DATA.map(section=>`<div class="section"><div class="section-header" onclick="toggleSection(this)"><span class="emoji">${section.emoji}</span>${section.title}<span class="toggle">▼</span></div><div class="section-body"><div class="delivery-cue">${section.cue}</div>${section.flow?`<div class="flow-map"><span class="label">Flow:</span>${section.flow.map((f,i)=>`<span class="flow-step">${f}</span>${i<section.flow.length-1?'<span class="flow-arrow">→</span>':''}`).join('')}</div>`:'' }${section.lines.map(line=>{if(line.type==='action')return`<div class="action-box">${line.text}</div>`;if(line.type==='response')return`<div class="response-box">${line.text}</div>`;if(line.type==='tip')return`<div class="tip-box">${line.text}</div>`;if(line.type==='stage')return`<div class="stage-dir">(${line.text})</div>`;let h='';if(line.beat)h+=`<div class="beat-label">${line.beat}</div>`;h+=`<div class="anchor-line"><span class="anchor-word">${line.anchor}</span><span class="anchor-script">${line.script}</span>${line.cue?`<span class="anchor-cue">${line.cue}</span>`:''}</div>`;return h}).join('')}</div></div>`).join('')}

function toggleSection(el){el.classList.toggle('collapsed');el.nextElementSibling.classList.toggle('hidden')}

function renderQuiz(){const total=ALL_ANCHORS.length,current=ALL_ANCHORS[quizState.index],correct=quizState.answered.filter(a=>a===true).length;if(quizState.index>=total)return`<div class="quiz-container"><div class="quiz-prompt">🎉 Complete!</div><div class="score-bar" style="justify-content:center;flex-direction:column;gap:8px;"><div class="score-value" style="font-size:48px;">${correct}/${total}</div><div class="score-label">${correct===total?'Perfect! You own this script.':correct>=total*0.8?'Strong! Almost there.':'Keep practicing.'}</div></div><button class="quiz-next-btn" onclick="quizState={index:0,score:0,answered:new Array(${total}).fill(null)};render();">Try Again</button></div>`;const options=[current.anchor],others=ALL_ANCHORS.filter((_,i)=>i!==quizState.index).map(a=>a.anchor);while(options.length<4&&others.length>0){const idx=Math.floor(Math.random()*others.length);if(!options.includes(others[idx]))options.push(others[idx]);others.splice(idx,1)}for(let i=options.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[options[i],options[j]]=[options[j],options[i]]}const answered=quizState.answered[quizState.index];return`<div class="quiz-container"><div class="quiz-progress">${quizState.answered.map((a,i)=>`<div class="quiz-dot ${i===quizState.index?'current':a===true?'done':a===false?'wrong':''}"></div>`).join('')}</div><div class="score-bar"><div><div class="score-label">Score</div><div class="score-value">${correct}</div></div><div><div class="score-label">Question</div><div class="score-value">${quizState.index+1}/${total}</div></div><div class="score-detail">${current.sectionEmoji} ${current.sectionTitle}</div></div><div class="quiz-section-label">What anchor comes next?</div><div class="quiz-prompt">${quizState.index===0?'First anchor?':`After: ${ALL_ANCHORS[quizState.index-1].anchor}`}</div><div class="quiz-hint">What's the next anchor word in the chain?</div><div class="quiz-options">${options.map(opt=>`<div class="quiz-option ${answered!==null?(opt===current.anchor?'correct':quizState._selected===opt?'wrong':''):''}" onclick="${answered===null?`quizAnswer('${opt.replace(/'/g,"\\'")}','${current.anchor.replace(/'/g,"\\'")}')`:''}" style="${answered!==null?'cursor:default;':''}">${opt}</div>`).join('')}</div>${answered!==null?`<div class="quiz-reveal"><div style="margin-bottom:8px;"><span class="anchor-word">${current.anchor}</span></div><div class="script">${current.script}</div>${current.cue?`<div style="margin-top:8px;font-size:13px;color:var(--green);font-style:italic;">${current.cue}</div>`:''}</div><button class="quiz-next-btn" onclick="quizState.index++;render();">Next →</button>`:''}</div>`}

function quizAnswer(s,c){const ok=s===c;quizState.answered[quizState.index]=ok;quizState._selected=s;if(ok)quizState.score++;render()}

function splitResponse(text){
  var m=text.match(/^(.*?)\u201c(.*?)\u201d(.*)$/);
  if(m) return {label:m[1].trim(), script:m[2].trim(), suffix:m[3].trim()};
  m=text.match(/^(.*?)"(.*?)"(.*)$/);
  if(m) return {label:m[1].trim(), script:m[2].trim(), suffix:m[3].trim()};
  var ci=text.indexOf(':');
  if(ci>0 && ci<text.length-1) return {label:text.substring(0,ci+1).trim(), script:text.substring(ci+1).trim(), suffix:''};
  return {label:'', script:text, suffix:''};
}

function renderFill(){return`<div class="fill-container"><div class="fill-controls"><button class="fill-ctrl-btn ${fillDifficulty===1?'active':''}" onclick="fillDifficulty=1;render();">★</button><button class="fill-ctrl-btn ${fillDifficulty===2?'active':''}" onclick="fillDifficulty=2;render();">★★</button><button class="fill-ctrl-btn ${fillDifficulty===3?'active':''}" onclick="fillDifficulty=3;render();">★★★</button><button class="fill-ctrl-btn ${fillDifficulty===4?'active':''}" onclick="fillDifficulty=4;render();">★★★★</button><button class="fill-ctrl-btn ${fillDifficulty===5?'active':''}" onclick="fillDifficulty=5;render();">★★★★★</button><button class="fill-ctrl-btn ${fillDifficulty===6?'active':''}" onclick="fillDifficulty=6;render();">★★★★★★</button></div><p style="text-align:center;font-size:13px;color:var(--gray);margin-bottom:24px;">Click blanks to reveal.</p><div style="text-align:center;font-size:11px;color:var(--gray);margin-bottom:20px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;"><span>★ Key words</span><span>★★ Every 4th</span><span>★★★ Every 2nd</span><span>★★★★ 3 of 4</span><span>★★★★★ First 3 words</span><span>★★★★★★ Anchor only</span></div>${DATA.map(section=>`<div class="fill-card"><div class="fill-section-tag">${section.emoji} ${section.title}</div>${section.lines.map(line=>{if(line.type==='response'){var r=splitResponse(line.text);return`<div class="response-box" style="display:block;"><span>${r.label}</span> <span class="fill-text" style="display:inline;">${blankify(r.script,fillDifficulty)}</span>${r.suffix?' <span style="font-style:italic;opacity:0.7;">'+r.suffix+'</span>':''}</div>`}if(line.type==='tip'){return`<div class="tip-box">${line.text}</div>`}if(line.type==='stage'){return`<div class="stage-dir">(${line.text})</div>`}if(!line.anchor)return'';let h='';if(line.beat)h+=`<div class="beat-label">${line.beat}</div>`;h+=`<div style="margin:8px 0;"><span class="fill-anchor">${line.anchor}</span><div class="fill-text">${blankify(line.script,fillDifficulty)}</div></div>`;return h}).join('')}</div>`).join('')}</div>`}

function blankify(t,d){
  var w=t.split(' ');
  var B=function(x){return '<span class="fill-blank" onclick="this.classList.add(\'revealed\')">'+x+'</span>'};
  if(d===6) return w.map(B).join(' ');
  if(d===5){var skip=0;for(var j=0;j<w.length&&j<5;j++){if(/[,&…]/.test(w[j])||w[j]==='&'){skip=j+1;}else if(skip>0){break;}}return w.map(function(x,i){return i<skip+3?x:B(x)}).join(' ');}
  if(d===4) return w.map(function(x,i){return i%4===0?x:B(x)}).join(' ');
  if(d===3) return w.map(function(x,i){return i%2===1?B(x):x}).join(' ');
  if(d===2) return w.map(function(x,i){return i%4===3?B(x):x}).join(' ');
  return w.map(function(x){
    var c=x.replace(/[^a-zA-Z]/g,'').toLowerCase();
    if(c.length>5) return B(x);
    return x;
  }).join(' ');
}

function firstLetterify(t){
  var w=t.split(' ');
  return w.map(function(x,i){
    if(x.length===0) return x;
    var first=x.charAt(0);
    var rest=x.substring(1).replace(/[a-zA-Z]/g,'_');
    var hint=first+rest;
    return '<span class="fl-word" data-w="'+encodeURIComponent(x)+'" onclick="this.textContent=decodeURIComponent(this.getAttribute(\'data-w\'));this.classList.add(\'fl-revealed\')">'+hint+'</span>';
  }).join(' ');
}


function renderFirstLetter(){
  return '<div class="fl-container"><p style="text-align:center;font-size:13px;color:var(--gray);margin-bottom:24px;">First letter shown, rest hidden. Click a word to reveal it. Practice recalling from just the first letters.</p>'+
  DATA.map(function(section){
    return '<div class="fl-card"><div class="fill-section-tag">'+section.emoji+' '+section.title+'</div>'+
    section.lines.map(function(line){
      if(line.type==='response'){
        var r=splitResponse(line.text);
        return '<div class="response-box" style="display:block;"><span>'+r.label+'</span> <span class="fl-text" style="display:inline;">'+firstLetterify(r.script)+'</span>'+(r.suffix?' <span style="font-style:italic;opacity:0.7;">'+r.suffix+'</span>':'')+'</div>';
      }
      if(line.type==='tip') return '<div class="tip-box">'+line.text+'</div>';
      if(line.type==='stage') return '<div class="stage-dir">('+line.text+')</div>';
      if(!line.anchor) return '';
      var h='';
      if(line.beat) h+='<div class="beat-label">'+line.beat+'</div>';
      h+='<div style="margin:12px 0;"><span class="fill-anchor">'+line.anchor+'</span><div class="fl-text">'+firstLetterify(line.script)+'</div></div>';
      return h;
    }).join('')+'</div>';
  }).join('')+'</div>';
}


render();
</script>
